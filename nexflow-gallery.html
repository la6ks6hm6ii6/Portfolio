<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/S.png">
    <title>NexFlow Gallery</title>
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}
body{
    background:linear-gradient(135deg,#000000,#111827,#1f2937);
    color:white;
    padding:40px;
}
h1{
    text-align:center;
    margin-bottom:40px;
}
.nexflow_gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(400px,1fr));
    gap:25px; 
    justify-items:center;
}
.nexflow_gallery img{
    width:100%;
    max-width: 500px;
    border-radius:12px;
    border:2px solid #6C63FF;
    transition:.3s;
    cursor:pointer;
    height: auto;
    
}
.nexflow_gallery img:hover{
    transform:scale(1.03);
    box-shadow:0 0 25px rgba(108,99,255,.5);
}
</style>
</head>
<body>
    <h1>NexFlow Gallery</h1>
    <div class="nexflow_gallery">
    <img src="nexflow_gallery/1.png" alt="">
    <img src="nexflow_gallery/2.jpg" alt="">
    <img src="nexflow_gallery/3.jpg" alt="">
    <img src="nexflow_gallery/4.jpg" alt="">
    <img src="nexflow_gallery/5.jpg" alt="">
    </div>
</body>
</html>
